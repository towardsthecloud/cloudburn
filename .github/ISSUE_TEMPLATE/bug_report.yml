name: Bug Report
description: Report a reproducible CloudBurn bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact CLI command(s), config, and input path.
      placeholder: |
        1. Run cloudburn scan ./terraform
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Versions
      description: Node, pnpm, package versions
      placeholder: Node 24.x, pnpm 10.x, @cloudburn/cli x.y.z
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Relevant config
      description: Redact secrets before posting.
      render: yaml
